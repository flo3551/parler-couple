<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <!-- Background -->
  <rect width="800" height="800" fill="#F5F0FA"/>

  <!-- Book spine shadow -->
  <rect x="220" y="170" width="22" height="460" rx="4" fill="#3a2550" opacity="0.8"/>

  <!-- Book/journal body -->
  <rect x="240" y="155" width="320" height="490" rx="16" fill="#5C3D7A"/>

  <!-- Book cover texture / subtle gradient overlay -->
  <rect x="240" y="155" width="320" height="490" rx="16" fill="url(#coverGrad)" opacity="0.25"/>
  <defs>
    <linearGradient id="coverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <!-- Page lines on the right side (suggesting open journal pages) -->
  <rect x="560" y="155" width="20" height="490" rx="0" fill="#e8ddf5"/>
  <!-- Stacked pages effect -->
  <rect x="562" y="158" width="16" height="484" rx="0" fill="#f0eaf8"/>
  <rect x="564" y="161" width="12" height="478" rx="0" fill="#f8f4fc"/>

  <!-- White ruled lines on cover suggesting pages -->
  <line x1="278" y1="310" x2="542" y2="310" stroke="white" stroke-width="1.5" opacity="0.35"/>
  <line x1="278" y1="340" x2="542" y2="340" stroke="white" stroke-width="1.5" opacity="0.35"/>
  <line x1="278" y1="370" x2="542" y2="370" stroke="white" stroke-width="1.5" opacity="0.35"/>
  <line x1="278" y1="400" x2="542" y2="400" stroke="white" stroke-width="1.5" opacity="0.25"/>
  <line x1="278" y1="430" x2="542" y2="430" stroke="white" stroke-width="1.5" opacity="0.25"/>
  <line x1="278" y1="460" x2="542" y2="460" stroke="white" stroke-width="1.5" opacity="0.2"/>

  <!-- Heart icon centered on cover -->
  <g transform="translate(362, 210) scale(2.8)">
    <path d="M20 8 C20 4 17 2 14 2 C11.5 2 9.5 3.5 8.5 5.5 C7.5 3.5 5.5 2 3 2 C0 2 -3 4 -3 8 C-3 14 8.5 22 8.5 22 C8.5 22 20 14 20 8Z" fill="white" opacity="0.9"/>
  </g>

  <!-- Lock icon below heart -->
  <g transform="translate(390, 256)">
    <!-- Lock body -->
    <rect x="-14" y="0" width="28" height="22" rx="4" fill="white" opacity="0.7"/>
    <!-- Lock shackle -->
    <path d="M-8 0 L-8 -10 Q0 -18 8 -10 L8 0" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <!-- Keyhole -->
    <circle cx="0" cy="10" r="4" fill="#5C3D7A" opacity="0.8"/>
    <rect x="-2" y="10" width="4" height="7" rx="1" fill="#5C3D7A" opacity="0.8"/>
  </g>

  <!-- "JOURNAL" text on cover -->
  <text x="400" y="530" font-family="Georgia, serif" font-size="62" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="6">JOURNAL</text>

  <!-- Divider -->
  <line x1="282" y1="552" x2="518" y2="552" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- "COUPLE" accent -->
  <text x="400" y="595" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="10" opacity="0.85">COUPLE</text>

  <!-- Decorative corner flourish top-left -->
  <g transform="translate(80, 80)" opacity="0.5">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#5C3D7A" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="#5C3D7A" opacity="0.2"/>
    <path d="M0 -30 Q10 -10 0 0 Q-10 -10 0 -30Z" fill="#5C3D7A" opacity="0.3"/>
    <path d="M30 0 Q10 10 0 0 Q10 -10 30 0Z" fill="#5C3D7A" opacity="0.3"/>
    <path d="M0 30 Q-10 10 0 0 Q10 10 0 30Z" fill="#5C3D7A" opacity="0.3"/>
    <path d="M-30 0 Q-10 -10 0 0 Q-10 10 -30 0Z" fill="#5C3D7A" opacity="0.3"/>
  </g>

  <!-- Decorative corner flourish bottom-right -->
  <g transform="translate(700, 700)" opacity="0.4">
    <circle cx="0" cy="0" r="24" fill="none" stroke="#5C3D7A" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#5C3D7A" opacity="0.15"/>
  </g>

  <!-- Small stars scattered -->
  <g transform="translate(660, 220)">
    <polygon points="0,-12 3,-4 11,-4 5,2 7,11 0,6 -7,11 -5,2 -11,-4 -3,-4" fill="#5C3D7A" opacity="0.4"/>
  </g>
  <g transform="translate(140, 580)">
    <polygon points="0,-9 2.5,-3 8,-3 4,1.5 5.5,8 0,4.5 -5.5,8 -4,1.5 -8,-3 -2.5,-3" fill="#5C3D7A" opacity="0.35"/>
  </g>

  <!-- Subtle border frame -->
  <rect x="18" y="18" width="764" height="764" rx="20" fill="none" stroke="#5C3D7A" stroke-width="2" opacity="0.12"/>
</svg>
